name: fraud-engine

services:
  postgres:
    image: pgvector/pgvector:0.8.3-pg16
    container_name: fraud-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FRAUD_ENGINE_POSTGRES_DB:?FRAUD_ENGINE_POSTGRES_DB must be set}
      POSTGRES_USER: ${FRAUD_ENGINE_POSTGRES_USER:?FRAUD_ENGINE_POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${FRAUD_ENGINE_POSTGRES_PASSWORD:?FRAUD_ENGINE_POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fraud-engine-net

  kafka:
    image: confluentinc/cp-kafka:8.3.0
    container_name: fraud-engine-kafka
    hostname: kafka
    restart: unless-stopped
    environment:
      # A stable KRaft cluster ID ensures the persisted metadata remains usable
      # across container recreation. This identifier is not a credential.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Kafka binds three distinct listeners: controller quorum traffic,
      # Docker-network client traffic, and traffic forwarded from the host.
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT

      # Advertised listeners are addresses returned to clients in broker
      # metadata. Containers resolve "kafka" on the bridge network, while
      # applications running directly on the developer machine use localhost.
      # Confluent images map KAFKA_ADVERTISED_LISTENERS to Kafka's
      # advertised.listeners property (other image families may use
      # KAFKA_CFG_ADVERTISED_LISTENERS for the same Kafka setting).
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      # Internal Kafka topics cannot use the production default replication
      # factor of three in this intentionally single-node Phase 1 cluster.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - fraud-engine-net

  vault:
    image: hashicorp/vault:1.19.5
    container_name: fraud-engine-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:?VAULT_TOKEN must be set}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    healthcheck:
      test:
        [
          "CMD",
          "vault",
          "status",
          "-address=http://127.0.0.1:8200",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - fraud-engine-net

  vault-bootstrap:
    image: hashicorp/vault:1.19.5
    container_name: fraud-engine-vault-bootstrap
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:?VAULT_TOKEN must be set}
      FRAUD_ENGINE_POSTGRES_USER: ${FRAUD_ENGINE_POSTGRES_USER:?FRAUD_ENGINE_POSTGRES_USER must be set}
      FRAUD_ENGINE_POSTGRES_PASSWORD: ${FRAUD_ENGINE_POSTGRES_PASSWORD:?FRAUD_ENGINE_POSTGRES_PASSWORD must be set}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set}
      EDGE_GATEWAY_JWT_ISSUER_URI: ${EDGE_GATEWAY_JWT_ISSUER_URI:?EDGE_GATEWAY_JWT_ISSUER_URI must be set}
      EDGE_GATEWAY_JWT_JWK_SET_URI: ${EDGE_GATEWAY_JWT_JWK_SET_URI:?EDGE_GATEWAY_JWT_JWK_SET_URI must be set}
      DASHBOARD_OIDC_CLIENT_ID: ${DASHBOARD_OIDC_CLIENT_ID:?DASHBOARD_OIDC_CLIENT_ID must be set}
      DASHBOARD_OIDC_CLIENT_SECRET: ${DASHBOARD_OIDC_CLIENT_SECRET:?DASHBOARD_OIDC_CLIENT_SECRET must be set}
    volumes:
      - ./vault/bootstrap.sh:/vault/bootstrap/bootstrap.sh:ro
    entrypoint:
      - /bin/sh
      - /vault/bootstrap/bootstrap.sh
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - fraud-engine-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.6
    container_name: fraud-engine-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --hostname-strict=false
      - --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN must be set}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8089}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8089}:8080"
    volumes:
      - ./keycloak/fraud-engine-realm.json:/opt/keycloak/data/import/fraud-engine-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/fraud-engine/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 45s
    networks:
      - fraud-engine-net

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: fraud-engine/eureka-server:phase-1
    container_name: fraud-engine-eureka-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${EUREKA_HOST_PORT:-8761}:8761"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://localhost:8761/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fraud-engine-net

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    image: fraud-engine/config-server:phase-5.5
    container_name: fraud-engine-config-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${CONFIG_SERVER_PROFILES:-native,vault}
      CONFIG_REPO_NATIVE_SEARCH_LOCATIONS: ${CONFIG_REPO_NATIVE_SEARCH_LOCATIONS:-file:/config-repo}
      CONFIG_REPO_GIT_URI: ${CONFIG_REPO_GIT_URI:-https://github.com/example/fraud-engine-configs.git}
      CONFIG_REPO_DEFAULT_LABEL: ${CONFIG_REPO_DEFAULT_LABEL:-main}
      CONFIG_REPO_SEARCH_PATHS: ${CONFIG_REPO_SEARCH_PATHS:-}
      CONFIG_REPO_USERNAME: ${CONFIG_REPO_USERNAME:-}
      CONFIG_REPO_PASSWORD: ${CONFIG_REPO_PASSWORD:-}
      CONFIG_REPO_PRIVATE_KEY: ${CONFIG_REPO_PRIVATE_KEY:-}
      CONFIG_REPO_PASSPHRASE: ${CONFIG_REPO_PASSPHRASE:-}
      CONFIG_REPO_STRICT_HOST_KEY_CHECKING: ${CONFIG_REPO_STRICT_HOST_KEY_CHECKING:-false}
      CONFIG_REPO_HOST_KEY: ${CONFIG_REPO_HOST_KEY:-}
      CONFIG_REPO_HOST_KEY_ALGORITHM: ${CONFIG_REPO_HOST_KEY_ALGORITHM:-}
      CONFIG_REPO_PREFERRED_AUTHENTICATIONS: ${CONFIG_REPO_PREFERRED_AUTHENTICATIONS:-publickey}
      CONFIG_REPO_SKIP_SSL_VALIDATION: ${CONFIG_REPO_SKIP_SSL_VALIDATION:-false}
      CONFIG_REPO_TIMEOUT_SECONDS: ${CONFIG_REPO_TIMEOUT_SECONDS:-10}
      CONFIG_REPO_REFRESH_RATE_SECONDS: ${CONFIG_REPO_REFRESH_RATE_SECONDS:-0}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_PORT: ${VAULT_PORT:-8200}
      VAULT_SCHEME: ${VAULT_SCHEME:-http}
      VAULT_BACKEND: ${VAULT_BACKEND:-secret}
      VAULT_DEFAULT_KEY: ${VAULT_DEFAULT_KEY:-fraud-engine}
      VAULT_TOKEN: ${VAULT_TOKEN:?VAULT_TOKEN must be set}
      VAULT_SKIP_SSL_VALIDATION: ${VAULT_SKIP_SSL_VALIDATION:-false}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    volumes:
      - ./fraud-engine-configs:/config-repo:ro
    depends_on:
      eureka-server:
        condition: service_healthy
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    ports:
      - "${CONFIG_SERVER_HOST_PORT:-8888}:8888"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://localhost:8888/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fraud-engine-net

  redis-primary:
    image: redis:8.2.7-alpine
    container_name: fraud-engine-redis-primary
    hostname: redis-primary
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - /bin/sh
      - -ec
      - >
        exec redis-server
        --appendonly yes
        --appendfsync everysec
        --requirepass "$$REDIS_PASSWORD"
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-primary-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fraud-engine-net

  redis-replica-1:
    image: redis:8.2.7-alpine
    container_name: fraud-engine-redis-replica-1
    hostname: redis-replica-1
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - /bin/sh
      - -ec
      - >
        exec redis-server
        --appendonly yes
        --appendfsync everysec
        --replicaof redis-primary 6379
        --masterauth "$$REDIS_PASSWORD"
        --requirepass "$$REDIS_PASSWORD"
    depends_on:
      redis-primary:
        condition: service_healthy
    volumes:
      - redis-replica-1-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fraud-engine-net

  redis-replica-2:
    image: redis:8.2.7-alpine
    container_name: fraud-engine-redis-replica-2
    hostname: redis-replica-2
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - /bin/sh
      - -ec
      - >
        exec redis-server
        --appendonly yes
        --appendfsync everysec
        --replicaof redis-primary 6379
        --masterauth "$$REDIS_PASSWORD"
        --requirepass "$$REDIS_PASSWORD"
    depends_on:
      redis-primary:
        condition: service_healthy
    volumes:
      - redis-replica-2-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fraud-engine-net

  redis-sentinel-1:
    image: redis:8.2.7-alpine
    container_name: fraud-engine-redis-sentinel-1
    hostname: redis-sentinel-1
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - /bin/sh
      - -ec
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor fraud-engine-master redis-primary 6379 2
        sentinel auth-pass fraud-engine-master $$REDIS_PASSWORD
        sentinel down-after-milliseconds fraud-engine-master 5000
        sentinel failover-timeout fraud-engine-master 15000
        sentinel parallel-syncs fraud-engine-master 1
        requirepass $$REDIS_PASSWORD
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_1_HOST_PORT:-26379}:26379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -p 26379 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fraud-engine-net

  redis-sentinel-2:
    image: redis:8.2.7-alpine
    container_name: fraud-engine-redis-sentinel-2
    hostname: redis-sentinel-2
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - /bin/sh
      - -ec
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor fraud-engine-master redis-primary 6379 2
        sentinel auth-pass fraud-engine-master $$REDIS_PASSWORD
        sentinel down-after-milliseconds fraud-engine-master 5000
        sentinel failover-timeout fraud-engine-master 15000
        sentinel parallel-syncs fraud-engine-master 1
        requirepass $$REDIS_PASSWORD
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_2_HOST_PORT:-26380}:26379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -p 26379 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fraud-engine-net

  redis-sentinel-3:
    image: redis:8.2.7-alpine
    container_name: fraud-engine-redis-sentinel-3
    hostname: redis-sentinel-3
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - /bin/sh
      - -ec
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor fraud-engine-master redis-primary 6379 2
        sentinel auth-pass fraud-engine-master $$REDIS_PASSWORD
        sentinel down-after-milliseconds fraud-engine-master 5000
        sentinel failover-timeout fraud-engine-master 15000
        sentinel parallel-syncs fraud-engine-master 1
        requirepass $$REDIS_PASSWORD
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_3_HOST_PORT:-26381}:26379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -p 26379 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fraud-engine-net

  tempo:
    image: grafana/tempo:2.8.2
    container_name: fraud-engine-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3200/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - fraud-engine-net

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: fraud-engine-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      edge-gateway:
        condition: service_healthy
      ai-fraud-agent:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - fraud-engine-net

  grafana:
    image: grafana/grafana:12.1.1
    container_name: fraud-engine-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fraud-engine-net

  edge-gateway:
    build:
      context: ./edge-gateway
      dockerfile: Dockerfile
    image: fraud-engine/edge-gateway:phase-2
    container_name: fraud-engine-edge-gateway
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      REDIS_SENTINEL_NODES: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      PAYMENT_RATE_LIMIT_REPLENISH_RATE: ${PAYMENT_RATE_LIMIT_REPLENISH_RATE:-100}
      PAYMENT_RATE_LIMIT_BURST_CAPACITY: ${PAYMENT_RATE_LIMIT_BURST_CAPACITY:-200}
      PAYMENT_RATE_LIMIT_REQUESTED_TOKENS: ${PAYMENT_RATE_LIMIT_REQUESTED_TOKENS:-1}
      PAYMENT_PUBLISH_TIMEOUT: ${PAYMENT_PUBLISH_TIMEOUT:-12s}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:-1.0}
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      tempo:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    ports:
      - "${EDGE_GATEWAY_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://localhost:8080/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - fraud-engine-net

  ai-fraud-agent:
    build:
      context: ./ai-fraud-agent
      dockerfile: Dockerfile
    image: fraud-engine/ai-fraud-agent:phase-4
    container_name: fraud-engine-ai-fraud-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: ${AI_FRAUD_AGENT_PROFILES:-mock-ai}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/${FRAUD_ENGINE_POSTGRES_DB:?FRAUD_ENGINE_POSTGRES_DB must be set}
      POSTGRES_USER: ${FRAUD_ENGINE_POSTGRES_USER:?FRAUD_ENGINE_POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${FRAUD_ENGINE_POSTGRES_PASSWORD:?FRAUD_ENGINE_POSTGRES_PASSWORD must be set}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${FRAUD_ENGINE_POSTGRES_DB:?FRAUD_ENGINE_POSTGRES_DB must be set}
      SPRING_DATASOURCE_USERNAME: ${FRAUD_ENGINE_POSTGRES_USER:?FRAUD_ENGINE_POSTGRES_USER must be set}
      SPRING_DATASOURCE_PASSWORD: ${FRAUD_ENGINE_POSTGRES_PASSWORD:?FRAUD_ENGINE_POSTGRES_PASSWORD must be set}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      FRAUD_AGENT_KAFKA_GROUP_ID: ${FRAUD_AGENT_KAFKA_GROUP_ID:-fraud-agent-group}
      FRAUD_AGENT_KAFKA_CONCURRENCY: ${FRAUD_AGENT_KAFKA_CONCURRENCY:-3}
      FRAUD_AGENT_PROCESSING_LEASE: ${FRAUD_AGENT_PROCESSING_LEASE:-2m}
      FRAUD_AGENT_DECISION_TIMEOUT: ${FRAUD_AGENT_DECISION_TIMEOUT:-20s}
      FRAUD_AGENT_PUBLISH_TIMEOUT: ${FRAUD_AGENT_PUBLISH_TIMEOUT:-10s}
      FRAUD_AGENT_SEED_MOCK_DATA: ${FRAUD_AGENT_SEED_MOCK_DATA:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:-1.0}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      tempo:
        condition: service_healthy
    ports:
      - "${AI_FRAUD_AGENT_HOST_PORT:-8082}:8082"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://localhost:8082/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - fraud-engine-net

  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
    image: fraud-engine/ledger-service:phase-3
    container_name: fraud-engine-ledger-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/${FRAUD_ENGINE_POSTGRES_DB:?FRAUD_ENGINE_POSTGRES_DB must be set}
      POSTGRES_USER: ${FRAUD_ENGINE_POSTGRES_USER:?FRAUD_ENGINE_POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${FRAUD_ENGINE_POSTGRES_PASSWORD:?FRAUD_ENGINE_POSTGRES_PASSWORD must be set}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${FRAUD_ENGINE_POSTGRES_DB:?FRAUD_ENGINE_POSTGRES_DB must be set}
      SPRING_DATASOURCE_USERNAME: ${FRAUD_ENGINE_POSTGRES_USER:?FRAUD_ENGINE_POSTGRES_USER must be set}
      SPRING_DATASOURCE_PASSWORD: ${FRAUD_ENGINE_POSTGRES_PASSWORD:?FRAUD_ENGINE_POSTGRES_PASSWORD must be set}
      LEDGER_KAFKA_GROUP_ID: ${LEDGER_KAFKA_GROUP_ID:-ledger-service-group}
      LEDGER_KAFKA_CONCURRENCY: ${LEDGER_KAFKA_CONCURRENCY:-3}
      LEDGER_PROCESSING_LEASE: ${LEDGER_PROCESSING_LEASE:-2m}
      LEDGER_LOCK_TIMEOUT_MS: ${LEDGER_LOCK_TIMEOUT_MS:-5000}
      LEDGER_QUERY_TIMEOUT_MS: ${LEDGER_QUERY_TIMEOUT_MS:-10000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:-1.0}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      tempo:
        condition: service_healthy
      ai-fraud-agent:
        condition: service_healthy
    ports:
      - "${LEDGER_SERVICE_HOST_PORT:-8081}:8081"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://localhost:8081/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - fraud-engine-net

  risk-ops-dashboard:
    build:
      context: ./risk-ops-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080/api/v1/stream/payments}
        AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
        AUTH_URL: ${AUTH_URL:-http://localhost:3001}
        DASHBOARD_OIDC_CLIENT_ID: ${DASHBOARD_OIDC_CLIENT_ID:?DASHBOARD_OIDC_CLIENT_ID must be set}
        DASHBOARD_OIDC_CLIENT_SECRET: ${DASHBOARD_OIDC_CLIENT_SECRET:?DASHBOARD_OIDC_CLIENT_SECRET must be set}
        DASHBOARD_OIDC_ISSUER: ${DASHBOARD_OIDC_ISSUER:-http://localhost:8089/realms/fraud-engine}
        DASHBOARD_OIDC_ISSUER_INTERNAL: ${DASHBOARD_OIDC_ISSUER_INTERNAL:-http://keycloak:8080/realms/fraud-engine}
        DASHBOARD_OIDC_AUTHORIZATION_URL: ${DASHBOARD_OIDC_AUTHORIZATION_URL:-http://localhost:8089/realms/fraud-engine/protocol/openid-connect/auth}
        DASHBOARD_OIDC_TOKEN_URL: ${DASHBOARD_OIDC_TOKEN_URL:-http://keycloak:8080/realms/fraud-engine/protocol/openid-connect/token}
        DASHBOARD_OIDC_LOGOUT_URL: ${DASHBOARD_OIDC_LOGOUT_URL:-http://localhost:8089/realms/fraud-engine/protocol/openid-connect/logout}
        DASHBOARD_POST_LOGOUT_REDIRECT_URL: ${DASHBOARD_POST_LOGOUT_REDIRECT_URL:-http://localhost:3001/}
    image: fraud-engine/risk-ops-dashboard:phase-6.5
    container_name: fraud-engine-risk-ops-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080/api/v1/stream/payments}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      KEYCLOAK_TOKEN_URL: ${KEYCLOAK_TOKEN_URL:-http://keycloak:8080/realms/fraud-engine/protocol/openid-connect/token}
      DASHBOARD_OIDC_CLIENT_ID: ${DASHBOARD_OIDC_CLIENT_ID:?DASHBOARD_OIDC_CLIENT_ID must be set}
      DASHBOARD_OIDC_CLIENT_SECRET: ${DASHBOARD_OIDC_CLIENT_SECRET:?DASHBOARD_OIDC_CLIENT_SECRET must be set}
      DASHBOARD_OIDC_ISSUER: ${DASHBOARD_OIDC_ISSUER:-http://localhost:8089/realms/fraud-engine}
      DASHBOARD_OIDC_ISSUER_INTERNAL: ${DASHBOARD_OIDC_ISSUER_INTERNAL:-http://keycloak:8080/realms/fraud-engine}
      DASHBOARD_OIDC_AUTHORIZATION_URL: ${DASHBOARD_OIDC_AUTHORIZATION_URL:-http://localhost:8089/realms/fraud-engine/protocol/openid-connect/auth}
      DASHBOARD_OIDC_TOKEN_URL: ${DASHBOARD_OIDC_TOKEN_URL:-http://keycloak:8080/realms/fraud-engine/protocol/openid-connect/token}
      DASHBOARD_OIDC_LOGOUT_URL: ${DASHBOARD_OIDC_LOGOUT_URL:-http://localhost:8089/realms/fraud-engine/protocol/openid-connect/logout}
      DASHBOARD_POST_LOGOUT_REDIRECT_URL: ${DASHBOARD_POST_LOGOUT_REDIRECT_URL:-http://localhost:3001/}
    depends_on:
      edge-gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${RISK_OPS_DASHBOARD_HOST_PORT:-3001}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fraud-engine-net

