server:
  port: 8888
  shutdown: graceful

spring:
  application:
    name: config-server
  lifecycle:
    timeout-per-shutdown-phase: 20s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

---
spring:
  config:
    activate:
      on-profile: "!native"
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_GIT_URI}
          default-label: ${CONFIG_REPO_DEFAULT_LABEL:main}
          search-paths: ${CONFIG_REPO_SEARCH_PATHS:}
          basedir: ${CONFIG_REPO_BASEDIR:/tmp/fraud-engine-config-repo}
          clone-on-start: true
          force-pull: true
          delete-untracked-branches: true
          timeout: ${CONFIG_REPO_TIMEOUT_SECONDS:10}
          refresh-rate: ${CONFIG_REPO_REFRESH_RATE_SECONDS:0}
          try-master-branch: false
          continue-on-multiple-label-failure: false
          skip-ssl-validation: ${CONFIG_REPO_SKIP_SSL_VALIDATION:false}
          username: ${CONFIG_REPO_USERNAME:}
          password: ${CONFIG_REPO_PASSWORD:}

---
spring:
  config:
    activate:
      on-profile: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_REPO_NATIVE_SEARCH_LOCATIONS:file:/config-repo}

---
spring:
  config:
    activate:
      on-profile: vault
  cloud:
    config:
      server:
        vault:
          host: ${VAULT_HOST:vault}
          port: ${VAULT_PORT:8200}
          scheme: ${VAULT_SCHEME:http}
          backend: ${VAULT_BACKEND:secret}
          default-key: ${VAULT_DEFAULT_KEY:fraud-engine}
          kv-version: 2
          authentication: TOKEN
          token: ${VAULT_TOKEN}
          skip-ssl-validation: ${VAULT_SKIP_SSL_VALIDATION:false}

---
spring:
  config:
    activate:
      on-profile: git-ssh
  cloud:
    config:
      server:
        git:
          ignore-local-ssh-settings: true
          private-key: ${CONFIG_REPO_PRIVATE_KEY}
          passphrase: ${CONFIG_REPO_PASSPHRASE:}
          strict-host-key-checking: ${CONFIG_REPO_STRICT_HOST_KEY_CHECKING:false}
          host-key: ${CONFIG_REPO_HOST_KEY:}
          host-key-algorithm: ${CONFIG_REPO_HOST_KEY_ALGORITHM:}
          preferred-authentications: ${CONFIG_REPO_PREFERRED_AUTHENTICATIONS:publickey}
